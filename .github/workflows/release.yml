name: Build and Release

on:
  push:
    branches:
      - main
  schedule:
    # 09:00 Europe/Moscow (UTC +3)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build

      - name: Prepare release metadata
        shell: bash
        run: |
          VERSION="$(grep '^version = ' build.gradle | sed -E 's/version = "([^"]+)"/\1/')"
          STAMP="$(date -u +'%Y%m%d-%H%M%S')"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            KIND="daily"
          else
            KIND="main"
          fi
          echo "RELEASE_TAG=v${VERSION}-${KIND}-${STAMP}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=KozelSmpWebApi ${VERSION} (${KIND} ${STAMP} UTC)" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: build/libs/*.jar
          generate_release_notes: true
